<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 30px; border: 1px solid #e0e0e0; border-radius: 12px; background-color: #ffffff; }
        .header { border-bottom: 2px solid #D4AF37; padding-bottom: 15px; margin-bottom: 25px; }
        .header h2 { color: #D4AF37; margin: 0; font-weight: 300; letter-spacing: 1px; }
        .field { margin-bottom: 15px; }
        .label { font-weight: bold; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .value { background-color: #f9f9f9; padding: 12px; border-radius: 8px; border-left: 4px solid #D4AF37; font-size: 15px; }
        .footer { margin-top: 30px; font-size: 12px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Support Inquiry</h2>
        </div>
        
        <div class="field">
            <span class="label">From</span>
            <div class="value">{{ name }} ({{ email }})</div>
        </div>
        
        <div class="field">
            <span class="label">Subject</span>
            <div class="value">{{ subject }}</div>
        </div>
        
        <div class="field">
            <span class="label">Message</span>
            <div class="value" style="white-space: pre-wrap;">{{ message }}</div>
        </div>
        
        <div class="footer">
            Sent from Marketplace Dispute Engine Support Form
        </div>
    </div>
</body>
</html>
